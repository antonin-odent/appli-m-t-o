<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: monospace;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        input {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #999;
            width: 250px;
        }

        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #999;
            background: white;
        }

        button:hover { background: #eee; }

        #error {
            color: red;
            margin-top: 1rem;
            display: none;
        }

        #result {
            margin-top: 2rem;
            background: white;
            border: 1px solid #ccc;
            padding: 1.5rem;
            width: 320px;
            display: none;
        }

        #result h2 { margin-bottom: 1rem; }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px solid #eee;
        }

        .row:last-child { border-bottom: none; }

        .label { color: #666; }

        #forecast {
            margin-top: 1.5rem;
            width: 320px;
        }

        #forecast h3 { margin-bottom: 0.5rem; }

        .day-row {
            background: white;
            border: 1px solid #ccc;
            padding: 0.5rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        #loading { margin-top: 1rem; display: none; }
    </style>
</head>
<body>

    <div style="margin-bottom: 1rem;">
        <input type="text" id="cityInput" placeholder="Ville..." />
        <button onclick="searchWeather()">Chercher</button>
    </div>

    <div id="error"></div>
    <div id="loading">Chargement...</div>

    <div id="result">
        <h2 id="cityName"></h2>
        <div class="row"><span class="label">Température</span><span id="temp"></span></div>
        <div class="row"><span class="label">Ressenti</span><span id="feels"></span></div>
        <div class="row"><span class="label">Condition</span><span id="desc"></span></div>
        <div class="row"><span class="label">Humidité</span><span id="humidity"></span></div>
        <div class="row"><span class="label">Vent</span><span id="wind"></span></div>
        <div class="row"><span class="label">Pression</span><span id="pressure"></span></div>
        <div class="row"><span class="label">Visibilité</span><span id="visibility"></span></div>
    </div>

    <div id="forecast">
        <h3 id="forecastTitle"></h3>
        <div id="forecastList"></div>
    </div>

    <script>
        const API_KEY = '3108083e7ea5b4bc9b829ae045c08519';

        document.getElementById('cityInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchWeather();
        });

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return;

            document.getElementById('error').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('forecastTitle').textContent = '';
            document.getElementById('forecastList').innerHTML = '';

            try {
                const r1 = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=fr`);
                if (!r1.ok) throw new Error('Ville introuvable');
                const w = await r1.json();

                const r2 = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric&lang=fr`);
                const f = await r2.json();

                displayWeather(w);
                displayForecast(f);
            } catch (e) {
                const err = document.getElementById('error');
                err.textContent = e.message;
                err.style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayWeather(d) {
            document.getElementById('cityName').textContent = `${d.name}, ${d.sys.country}`;
            document.getElementById('temp').textContent = `${Math.round(d.main.temp)}°C`;
            document.getElementById('feels').textContent = `${Math.round(d.main.feels_like)}°C`;
            document.getElementById('desc').textContent = d.weather[0].description;
            document.getElementById('humidity').textContent = `${d.main.humidity}%`;
            document.getElementById('wind').textContent = `${Math.round(d.wind.speed)} m/s`;
            document.getElementById('pressure').textContent = `${d.main.pressure} hPa`;
            document.getElementById('visibility').textContent = `${(d.visibility / 1000).toFixed(0)} km`;
            document.getElementById('result').style.display = 'block';
        }

        function displayForecast(f) {
            const daily = {};
            f.list.forEach(item => {
                const date = new Date(item.dt * 1000).toLocaleDateString('fr');
                if (!daily[date]) daily[date] = item;
            });

            const days = Object.entries(daily).slice(0, 5);
            document.getElementById('forecastTitle').textContent = 'Prévisions 5 jours';

            const list = document.getElementById('forecastList');
            days.forEach(([date, item]) => {
                const div = document.createElement('div');
                div.className = 'day-row';
                div.innerHTML = `<span>${date}</span><span>${item.weather[0].description}</span><span>${Math.round(item.main.temp)}°C</span>`;
                list.appendChild(div);
            });
        }

        document.getElementById('cityInput').value = 'Paris';
        searchWeather();
    </script>
</body>
</html>
