<!--const = valeur non modifiable 
let = valeur modifiable 
async = 
await= 
prévisons = forcast -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo - Application</title>

    <!-- Feuille de style Leaflet pour la carte interactive -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Police Google Fonts : Inter, utilisée pour toute l'interface -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           RESET CSS
           Supprime les marges/paddings par défaut
           du navigateur sur tous les éléments
        ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Le padding ne s'ajoute pas à la largeur */
        }

        /* ==========================================
           VARIABLES CSS (thème couleurs)
           Centralisées ici pour pouvoir les
           modifier facilement en un seul endroit
        ========================================== */
        :root {
            --primary: #ff6b35;                        /* Couleur principale : orange */
            --bg-card: rgba(255, 255, 255, 0.95);      /* Fond des cartes : blanc semi-transparent */
            --bg-secondary: rgba(245, 242, 235, 0.95); /* Fond secondaire : beige clair */
            --text-primary: #2c3e50;                   /* Texte principal : gris foncé */
            --text-secondary: #7f8c8d;                 /* Texte secondaire : gris clair */
            --shadow: rgba(0, 0, 0, 0.15);             /* Couleur des ombres */
        }

        /* ==========================================
           BODY - Mise en page globale
        ========================================== */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #4a5568 0%, #2d3748 100%); /* Dégradé de secours */
            min-height: 100vh;     /* Minimum = toute la hauteur de l'écran */
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;    /* Pas de scroll horizontal */
        }

        /* ==========================================
           IMAGE DE FOND MÉTÉO
           Positionnée en position fixe pour rester
           visible même quand on défile la page
        ========================================== */
        .weather-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=1920&q=80') center/cover;
            z-index: 0; /* Derrière tous les autres éléments */
        }

        /* Overlay sombre par-dessus l'image de fond
           pour améliorer la lisibilité du texte blanc */
        .weather-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
        }

        /* ==========================================
           CONTENEUR PRINCIPAL
           Centré et limité en largeur pour rester
           lisible sur les grands écrans
        ========================================== */
        .container {
            position: relative;
            z-index: 1;          /* Au-dessus du fond */
            max-width: 1400px;
            margin: 0 auto;      /* Centré horizontalement */
            padding: 2rem;
        }

        /* ==========================================
           EN-TÊTE (header)
           Flex = éléments côte à côte avec espace
           entre eux
        ========================================== */
        header {
            display: flex;
            justify-content: space-between; /* Écarte les éléments */
            align-items: center;
            margin-bottom: 2rem;
        }

        /* Logo en haut à gauche */
        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Barre de recherche avec effet verre (glassmorphism) */
        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);  /* Fond blanc transparent */
            backdrop-filter: blur(10px);             /* Flou de l'arrière-plan */
            border-radius: 24px;
            padding: 0.75rem 1.5rem;
            gap: 0.75rem;
            min-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Champ de texte dans la barre de recherche */
        .search-bar input {
            flex: 1;            /* Prend tout l'espace disponible */
            background: none;   /* Fond transparent */
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;      /* Supprime le contour bleu par défaut */
        }

        /* Texte grisé dans le champ vide */
        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-icon {
            color: white;
            font-size: 1.2rem;
        }

        /* Affichage de la ville sélectionnée */
        .location-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        /* Boutons pour basculer entre °C et °F */
        .temp-toggle {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 0.25rem;
        }

        .temp-toggle button {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: white;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s; /* Animation fluide sur le changement */
        }

        /* Bouton actif (unité sélectionnée) */
        .temp-toggle button.active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ==========================================
           PRÉVISIONS SUR 7 JOURS
           Barre horizontale scrollable
        ========================================== */
        .forecast-days {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;      /* Scroll horizontal si trop de cartes */
            padding-bottom: 0.5rem;
        }

        /* Carte pour chaque jour de la semaine */
        .day-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            min-width: 120px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Jour actuellement sélectionné */
        .day-card.active {
            background: var(--primary); /* Orange vif */
        }

        /* Effet survol : légère élévation */
        .day-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.25);
        }

        /* Le survol ne doit pas changer la couleur du jour actif */
        .day-card.active:hover {
            background: var(--primary);
        }

        .day-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .day-temp {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .day-icon {
            font-size: 2rem;
            margin: 0.5rem 0;
        }

        /* ==========================================
           CONTENU PRINCIPAL
           Grid 2 colonnes : météo actuelle + prévisions horaires
        ========================================== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr; /* Colonne gauche plus étroite */
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Styles communs à toutes les cartes blanches */
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px var(--shadow);
        }

        .current-weather {
            position: relative;
            overflow: hidden;
        }

        /* Photo illustrant la météo actuelle */
        .weather-image {
            width: 100%;
            height: 300px;
            object-fit: cover;      /* Recadre sans déformer */
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        /* Grande température affichée */
        .current-temp {
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .weather-description {
            font-size: 1.5rem;
            color: var(--text-secondary);
            text-transform: capitalize; /* Première lettre majuscule */
            margin: 0.5rem 0 1.5rem;
        }

        .feels-like {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        /* Grille 3x2 pour les détails météo (vent, humidité, etc.) */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        /* Chaque mini-carte de détail */
        .detail-item {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 16px;
            text-align: center;
        }

        .detail-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Label en petites majuscules */
        .detail-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .hourly-forecast {
            background: var(--bg-card);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        /* Conteneur scrollable horizontal pour les heures */
        .hourly-scroll {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }

        /* Carte pour chaque tranche horaire */
        .hour-card {
            min-width: 100px;
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 16px;
            text-align: center;
            flex-shrink: 0; /* Empêche le rétrécissement des cartes */
        }

        .hour-time {
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .hour-icon {
            font-size: 2rem;
            margin: 0.5rem 0;
        }

        .hour-temp {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Probabilité de précipitations en petit gris */
        .hour-precip {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* ==========================================
           SECTION CARTE LEAFLET
        ========================================== */
        .map-section {
            height: 400px;
            border-radius: 24px;
            overflow: hidden; /* Arrondit les coins de la carte */
            box-shadow: 0 8px 32px var(--shadow);
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* Bouton Favoris dans le header */
        .favorites-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .favorites-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Ville déjà en favori = orange */
        .favorites-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ==========================================
           OVERLAY DE CHARGEMENT
           Masqué par défaut, visible avec .active
        ========================================== */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Centrage parfait */
            background: white;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000; /* Au-dessus de tout */
        }

        .loading.active {
            display: block;
        }

        /* Cercle qui tourne pendant le chargement */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary); /* Un seul côté coloré = effet rotatif */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        /* Animation de rotation */
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Bandeau d'erreur rouge (masqué par défaut) */
        .error {
            background: #ff4444;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }

        .error.active {
            display: block;
        }

        /* ==========================================
           RESPONSIVE - Tablette (≤ 1024px)
           Passe d'une grille 2 colonnes à 1 colonne
        ========================================== */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .search-bar {
                min-width: 300px;
            }
        }

        /* ==========================================
           RESPONSIVE - Mobile (≤ 768px)
        ========================================== */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            /* Header en colonne sur mobile */
            header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .search-bar {
                min-width: auto;
            }

            /* 2 colonnes au lieu de 3 pour les détails */
            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            /* Température plus petite sur mobile */
            .current-temp {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Image de fond fixe (photo de ciel/nuages) -->
    <div class="weather-bg"></div>
   
    <div class="container">

        <!-- ==============================
             EN-TÊTE : Logo | Recherche | Favoris
        ============================== -->
        <header>
            <div class="logo">
                ☁️ météo
            </div>

            <!-- Champ de recherche : appuyer sur Entrée lance la recherche -->
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="cityInput" placeholder="Search City" />
            </div>

            <!-- Bouton pour ajouter/retirer la ville des favoris -->
            <button class="favorites-btn" id="favoriteBtn" onclick="toggleFavorite()">
                ⭐ <span id="favText">Add to Favorites</span>
            </button>
        </header>

        <!-- Message d'erreur (masqué, s'affiche si API échoue) -->
        <div class="error" id="error"></div>

        <!-- Barre : nom de la ville + boutons °C / °F -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <div class="location-info">
                <span>📍</span>
                <span id="cityName">Paris, FR</span>
            </div>
            <div class="temp-toggle">
                <!-- onclick passe l'unité et l'événement (pour gérer le style actif) -->
                <button class="active" onclick="switchUnit('celsius', event)">°C</button>
                <button onclick="switchUnit('fahrenheit', event)">°F</button>
            </div>
        </div>

        <!-- Prévisions sur 7 jours (cartes générées dynamiquement en JS) -->
        <div class="forecast-days" id="forecastDays"></div>

        <!-- Grille principale : météo actuelle + prévisions horaires -->
        <div class="main-content">

            <!-- Colonne gauche : météo du jour -->
            <div class="card current-weather">
                <!-- Photo qui change selon la météo (soleil, pluie, neige...) -->
                <img class="weather-image" id="weatherImage"
                     src="https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=600&q=80"
                     alt="Weather">

                <!-- Température principale -->
                <div class="current-temp" id="currentTemp">12°</div>
                <!-- Description textuelle (ex: "nuageux", "pluie légère") -->
                <div class="weather-description" id="weatherDesc">Drizzle</div>
                <!-- Température ressentie -->
                <div class="feels-like" id="feelsLike">Ressenti 11°</div>

                <!-- Grille de détails météo -->
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-icon">💨</div>
                        <div class="detail-label">Vent</div>
                        <div class="detail-value" id="windSpeed">5 m/s S</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">💧</div>
                        <div class="detail-label">Humidité</div>
                        <div class="detail-value" id="humidity">93%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">👁️</div>
                        <div class="detail-label">Visibilité</div>
                        <div class="detail-value" id="visibility">8km</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-label">Pression</div>
                        <div class="detail-value" id="pressure">989 hPa</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">☀️</div>
                        <div class="detail-label">Indice UV</div>
                        <div class="detail-value" id="uvIndex">0 UV</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">💦</div>
                        <div class="detail-label">Dew Point</div>
                        <div class="detail-value" id="dewPoint">11°C</div>
                    </div>
                </div>
            </div>

            <!-- Colonne droite : prévisions heure par heure -->
            <div class="card hourly-forecast">
                <h2 class="section-title">Prévisions</h2>
                <!-- Les cartes horaires sont injectées ici par JS -->
                <div class="hourly-scroll" id="hourlyForecast"></div>
            </div>
        </div>

        <!-- Carte interactive Leaflet (OpenStreetMap) -->
        <div class="map-section">
            <div id="map"></div>
        </div>
    </div>

    <!-- Overlay de chargement avec spinner (masqué par défaut) -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading weather data...</p>
    </div>

    <!-- Bibliothèque Leaflet pour la carte interactive -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ============================================================
        // CONFIGURATION & VARIABLES GLOBALES
        // ============================================================

        // Clé API OpenWeatherMap (nécessaire pour faire les requêtes)
        const API_KEY = '3108083e7ea5b4bc9b829ae045c08519';

        // Ville actuellement affichée
        let currentCity = null;

        // Unité de température : 'celsius' ou 'fahrenheit'
        let currentUnit = 'celsius';

        // Données météo brutes reçues de l'API (météo actuelle)
        let currentWeatherData = null;

        // Données de prévisions reçues de l'API (7 jours / horaires)
        let currentForecastData = null;

        // Instance de la carte Leaflet
        let map = null;

        // Liste des villes favorites, stockée dans le localStorage du navigateur
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        // ============================================================
        // PHOTOS PAR CONDITION MÉTÉO
        // Chaque clé correspond à un type météo retourné par l'API
        // ============================================================
        const weatherImages = {
            'Clear':        'https://images.unsplash.com/photo-1601297183305-6df142704ea2?w=600&q=80',
            'Clouds':       'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=600&q=80',
            'Rain':         'https://images.unsplash.com/photo-1519692933481-e162a57d6721?w=600&q=80',
            'Drizzle':      'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=600&q=80',
            'Thunderstorm': 'https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=600&q=80',
            'Snow':         'https://images.unsplash.com/photo-1491002052546-bf38f186af56?w=600&q=80',
            'Mist':         'https://images.unsplash.com/photo-1485236715568-ddc5ee6ca227?w=600&q=80'
        };

        // ============================================================
        // CORRESPONDANCE CODES ICÔNES → EMOJIS
        // Les codes (ex: '01d') viennent de l'API OpenWeatherMap
        // d = day (jour), n = night (nuit)
        // ============================================================
        const iconMap = {
            '01d': '☀️', '01n': '🌙',   // Ciel dégagé
            '02d': '⛅', '02n': '☁️',   // Quelques nuages
            '03d': '☁️', '03n': '☁️',   // Nuageux
            '04d': '☁️', '04n': '☁️',   // Très nuageux
            '09d': '🌧️', '09n': '🌧️',  // Averses
            '10d': '🌦️', '10n': '🌧️',  // Pluie
            '11d': '⛈️', '11n': '⛈️',  // Orage
            '13d': '❄️', '13n': '❄️',   // Neige
            '50d': '🌫️', '50n': '🌫️'   // Brouillard
        };

        // ============================================================
        // INITIALISATION DE LA CARTE LEAFLET
        // Crée ou recrée la carte à partir des coordonnées GPS
        // ============================================================
        function initMap(lat, lon, cityName) {
            // Si une carte existait déjà, on la supprime avant d'en créer une nouvelle
            if (map) {
                map.remove();
            }
           
            // Création de la carte centrée sur les coordonnées, zoom niveau 8
            map = L.map('map').setView([lat, lon], 8);
           
            // Ajout des tuiles OpenStreetMap (fond de carte)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Marqueur à la position de la ville, avec popup affichant le nom
            L.marker([lat, lon]).addTo(map)
                .bindPopup(`<b>${cityName}</b>`)
                .openPopup();

            // Clic sur la carte → charge la météo de l'endroit cliqué
            map.on('click', function(e) {
                getWeatherByCoords(e.latlng.lat, e.latlng.lng);
            });
        }

        // ============================================================
        // RÉCUPÉRATION MÉTÉO PAR COORDONNÉES GPS
        // Appelée quand on clique sur la carte
        // ============================================================
        async function getWeatherByCoords(lat, lon) {
            showLoading(true);
            hideError();
           
            try {
                // Requête 1 : météo actuelle à ces coordonnées
                const weatherResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=fr`
                );
               
                if (!weatherResponse.ok) throw new Error('Location not found');
               
                const weatherData = await weatherResponse.json();
               
                // Requête 2 : prévisions sur 5 jours (par tranches de 3h)
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=fr`
                );
                const forecastData = await forecastResponse.json();

                // Requête 3 : données avancées (indice UV, etc.) via l'API One Call
                const oneCallResp = await fetch(
                    `https://api.openweathermap.org/data/3.0/onecall?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=fr`
                );
                const oneCallData = await oneCallResp.json();
               
                // Mise à jour des variables globales
                currentCity = weatherData.name;
                currentWeatherData = weatherData;
                currentForecastData = forecastData;

                // Récupère l'indice UV (0 par défaut si non disponible)
                const uvIndex = oneCallData.current && typeof oneCallData.current.uvi !== 'undefined'
                    ? oneCallData.current.uvi
                    : 0;

                // Affiche toutes les données à l'écran
                displayWeather(weatherData, forecastData, uvIndex);
                updateFavoriteButton();
            } catch (error) {
                showError(error.message);
            } finally {
                // Toujours masquer le loader, même en cas d'erreur
                showLoading(false);
            }
        }

        // ============================================================
        // RECHERCHE PAR NOM DE VILLE
        // Déclenchée par la touche Entrée dans le champ de recherche
        // ============================================================
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return; // Ne fait rien si le champ est vide
           
            showLoading(true);
            hideError();
           
            try {
                // Requête 1 : météo actuelle pour la ville saisie
                const weatherResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=fr`
                );
               
                if (!weatherResponse.ok) throw new Error('City not found');
               
                const weatherData = await weatherResponse.json();
               
                // Requête 2 : prévisions 5 jours
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric&lang=fr`
                );
                const forecastData = await forecastResponse.json();

                // Requête 3 : One Call (UV, etc.) en utilisant les coords reçues
                const oneCallResp = await fetch(
                    `https://api.openweathermap.org/data/3.0/onecall?lat=${weatherData.coord.lat}&lon=${weatherData.coord.lon}&appid=${API_KEY}&units=metric&lang=fr`
                );
                const oneCallData = await oneCallResp.json();
               
                // Sauvegarde des données en mémoire
                currentCity = weatherData.name;
                currentWeatherData = weatherData;
                currentForecastData = forecastData;

                const uvIndex = oneCallData.current && typeof oneCallData.current.uvi !== 'undefined'
                    ? oneCallData.current.uvi
                    : 0;
               
                displayWeather(weatherData, forecastData, uvIndex);
                updateFavoriteButton();
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        // ============================================================
        // AFFICHAGE DE TOUTES LES DONNÉES MÉTÉO
        // Met à jour tous les éléments HTML avec les nouvelles données
        // ============================================================
        function displayWeather(data, forecast, uvIndex) {
            // Photo de fond selon la condition météo (Clear, Rain, Snow...)
            const weatherMain = data.weather[0].main;
            document.getElementById('weatherImage').src = weatherImages[weatherMain] || weatherImages['Clouds'];
           
            // Nom de la ville et pays (ex: "Paris, FR")
            document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
            // Description (ex: "pluie légère")
            document.getElementById('weatherDesc').textContent = data.weather[0].description;
           
            // Met à jour les températures selon l'unité active
            updateTemperatures(data);
           
            // Vitesse du vent + direction cardinale
            const windDir = getWindDirection(data.wind.deg);
            document.getElementById('windSpeed').textContent = `${Math.round(data.wind.speed)} m/s ${windDir}`;
            
            // Humidité en %
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            
            // Visibilité : convertie de mètres en km
            document.getElementById('visibility').textContent = `${(data.visibility / 1000).toFixed(0)}km`;
            
            // Pression atmosphérique en hPa
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            
            // Indice UV arrondi à l'entier
            document.getElementById('uvIndex').textContent = `${uvIndex.toFixed(0)} UV`;
           
            // Point de rosée : calculé à partir de la temp et de l'humidité
            const dewPoint = calculateDewPoint(data.main.temp, data.main.humidity);
            document.getElementById('dewPoint').textContent = currentUnit === 'celsius'
                ? `${Math.round(dewPoint)}°C`
                : `${Math.round((dewPoint * 9/5) + 32)}°F`;
           
            // Génère les cartes des 7 jours et des prévisions horaires
            displayForecastDays(forecast);
            displayHourlyForecast(forecast);

            // Réinitialise la carte à la nouvelle position
            initMap(data.coord.lat, data.coord.lon, data.name);
        }

        // ============================================================
        // MISE À JOUR DES TEMPÉRATURES
        // Appelée aussi quand on change d'unité (°C ↔ °F)
        // ============================================================
        function updateTemperatures(data) {
            if (currentUnit === 'celsius') {
                document.getElementById('currentTemp').textContent = `${Math.round(data.main.temp)}°`;
                document.getElementById('feelsLike').textContent = `Feels like ${Math.round(data.main.feels_like)}°`;
            } else {
                // Conversion °C → °F : (°C × 9/5) + 32
                const tempF = (data.main.temp * 9/5) + 32;
                const feelsF = (data.main.feels_like * 9/5) + 32;
                document.getElementById('currentTemp').textContent = `${Math.round(tempF)}°`;
                document.getElementById('feelsLike').textContent = `Feels like ${Math.round(feelsF)}°`;
            }
        }

        // ============================================================
        // AFFICHAGE DES PRÉVISIONS SUR 7 JOURS
        // L'API forecast renvoie des données toutes les 3h → on regroupe par jour
        // ============================================================
        function displayForecastDays(forecast) {
            const container = document.getElementById('forecastDays');
            container.innerHTML = ''; // Vide le conteneur avant de le remplir
           
            // Regroupe les données par jour (1 entrée par jour)
            const dailyData = {};
            forecast.list.forEach(item => {
                // Convertit le timestamp Unix en date lisible (ex: "23/03/2025")
                const date = new Date(item.dt * 1000).toLocaleDateString();
                // Garde uniquement la première entrée de chaque journée
                if (!dailyData[date]) {
                    dailyData[date] = item;
                }
            });
           
            // Prend les 7 premiers jours
            const days = Object.values(dailyData).slice(0, 7);
            days.forEach((day, index) => {
                const date = new Date(day.dt * 1000);
                // "Today" pour aujourd'hui, sinon le nom du jour (ex: "Mon", "Tue")
                const dayName = index === 0 ? 'Today' : date.toLocaleDateString('en', { weekday: 'short' });
                // Convertit si besoin en °F
                const temp = currentUnit === 'celsius'
                    ? Math.round(day.main.temp)
                    : Math.round((day.main.temp * 9/5) + 32);
               
                // Crée la carte HTML du jour
                const card = document.createElement('div');
                card.className = `day-card ${index === 0 ? 'active' : ''}`; // Actif pour "Today"
                card.innerHTML = `
                    <div class="day-name">${dayName}</div>
                    <div class="day-icon">${iconMap[day.weather[0].icon]}</div>
                    <div class="day-temp">${temp}°</div>
                `;
                container.appendChild(card);
            });
        }

        // ============================================================
        // AFFICHAGE DES PRÉVISIONS HORAIRES
        // Prend les 8 premières tranches (= 24h, toutes les 3h)
        // ============================================================
        function displayHourlyForecast(forecast) {
            const container = document.getElementById('hourlyForecast');
            container.innerHTML = '';
           
            // Prend les 8 premières entrées (toutes les 3h sur 24h)
            const hours = forecast.list.slice(0, 8);
            hours.forEach(hour => {
                // Formate l'heure : "3 PM", "6 AM", etc.
                const time = new Date(hour.dt * 1000).toLocaleTimeString('en', { hour: 'numeric', hour12: true });
                // Température convertie si besoin
                const temp = currentUnit === 'celsius'
                    ? Math.round(hour.main.temp)
                    : Math.round((hour.main.temp * 9/5) + 32);
                // Probabilité de précipitations (0 à 1 → affichée en %)
                const precip = hour.pop ? `${Math.round(hour.pop * 100)}%` : '0%';
               
                const card = document.createElement('div');
                card.className = 'hour-card';
                card.innerHTML = `
                    <div class="hour-time">${time}</div>
                    <div class="hour-icon">${iconMap[hour.weather[0].icon]}</div>
                    <div class="hour-temp">${temp}°</div>
                    <div class="hour-precip">${precip}</div>
                `;
                container.appendChild(card);
            });
        }

        // ============================================================
        // CONVERSION DEGRÉS → DIRECTION CARDINALE
        // Ex: 0° = Nord, 90° = Est, 180° = Sud, 270° = Ouest
        // ============================================================
        function getWindDirection(deg) {
            const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            // Divise 360° en 8 sections de 45°, arrondit à la plus proche
            return dirs[Math.round(deg / 45) % 8];
        }

        // ============================================================
        // CALCUL DU POINT DE ROSÉE (formule Magnus)
        // Le point de rosée = température à laquelle l'air est saturé
        // Paramètres : temp en °C, humidity en %
        // ============================================================
        function calculateDewPoint(temp, humidity) {
            const a = 17.27;
            const b = 237.7;
            // Formule de Magnus approximée
            const alpha = ((a * temp) / (b + temp)) + Math.log(humidity / 100);
            return (b * alpha) / (a - alpha);
        }

        // ============================================================
        // CHANGEMENT D'UNITÉ (°C / °F)
        // Recalcule et réaffiche toutes les températures
        // ============================================================
        function switchUnit(unit, event) {
            currentUnit = unit;
           
            // Retire la classe "active" de tous les boutons
            document.querySelectorAll('.temp-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
           
            // Ajoute "active" au bouton cliqué
            if (event && event.target) {
                event.target.classList.add('active');
            }

            // Si des données sont déjà chargées, on les réaffiche
            if (currentWeatherData) {
                updateTemperatures(currentWeatherData);

                // Régénère les cartes des jours et des heures avec la nouvelle unité
                if (currentForecastData) {
                    displayForecastDays(currentForecastData);
                    displayHourlyForecast(currentForecastData);
                }

                // Recalcule et met à jour le point de rosée
                const dewPoint = calculateDewPoint(
                    currentWeatherData.main.temp,
                    currentWeatherData.main.humidity
                );
                document.getElementById('dewPoint').textContent = currentUnit === 'celsius'
                    ? `${Math.round(dewPoint)}°C`
                    : `${Math.round((dewPoint * 9/5) + 32)}°F`;
            }
        }

        // ============================================================
        // GESTION DES FAVORIS
        // Ajoute ou retire la ville actuelle du tableau favorites
        // Synchronise avec le localStorage pour persister entre sessions
        // ============================================================
        function toggleFavorite() {
            if (!currentCity) return;
           
            // Cherche si la ville est déjà dans les favoris
            const index = favorites.findIndex(f => f === currentCity);
           
            if (index > -1) {
                favorites.splice(index, 1); // Retire la ville
            } else {
                favorites.push(currentCity); // Ajoute la ville
            }
           
            // Sauvegarde la liste mise à jour dans le localStorage
            localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
            updateFavoriteButton();
        }

        // ============================================================
        // MISE À JOUR VISUELLE DU BOUTON FAVORIS
        // Affiche "Remove" ou "Add" selon l'état actuel
        // ============================================================
        function updateFavoriteButton() {
            const btn = document.getElementById('favoriteBtn');
            const text = document.getElementById('favText');
            // Vérifie si la ville actuelle est dans les favoris
            const isFavorite = favorites.some(f => f === currentCity);
           
            if (isFavorite) {
                btn.classList.add('active');          // Orange
                text.textContent = 'Remove from Favorites';
            } else {
                btn.classList.remove('active');        // Transparent
                text.textContent = 'Add to Favorites';
            }
        }

        // ============================================================
        // FONCTIONS UTILITAIRES : Loader, Erreurs
        // ============================================================

        // Affiche ou masque le spinner de chargement
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        // Affiche un message d'erreur pendant 5 secondes
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('active');
            setTimeout(() => error.classList.remove('active'), 5000); // Disparaît après 5s
        }

        // Masque immédiatement le message d'erreur
        function hideError() {
            document.getElementById('error').classList.remove('active');
        }

        // ============================================================
        // ÉVÉNEMENT CLAVIER
        // Déclenche la recherche quand l'utilisateur appuie sur Entrée
        // ============================================================
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // ============================================================
        // INITIALISATION AU CHARGEMENT DE LA PAGE
        // Lance la recherche pour Paris par défaut
        // ============================================================
        document.getElementById('cityInput').value = 'Paris';
        searchWeather();
    </script>
</body>
